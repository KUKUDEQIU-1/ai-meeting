services:
  ai-meeting:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-meeting
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: ${PORT:-3000}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-https://huiyiai.yourtest.top}
      APP_BASE_URL: ${APP_BASE_URL:-https://huiyiai.yourtest.top}
      AI_API_URL: ${AI_API_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-5.5}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_BITABLE_APP_TOKEN: ${FEISHU_BITABLE_APP_TOKEN:-}
      FEISHU_BITABLE_TABLE_ID: ${FEISHU_BITABLE_TABLE_ID:-}
      FEISHU_BITABLE_APP_URL: ${FEISHU_BITABLE_APP_URL:-}
      FEISHU_MASTER_TASK_APP_TOKEN: ${FEISHU_MASTER_TASK_APP_TOKEN:-}
      FEISHU_MASTER_TASK_TABLE_ID: ${FEISHU_MASTER_TASK_TABLE_ID:-}
      FEISHU_MASTER_TASK_TABLE_URL: ${FEISHU_MASTER_TASK_TABLE_URL:-}
      FEISHU_MASTER_TASK_TEMPLATE_APP_TOKEN: ${FEISHU_MASTER_TASK_TEMPLATE_APP_TOKEN:-}
      FEISHU_MASTER_TASK_TEMPLATE_TABLE_ID: ${FEISHU_MASTER_TASK_TEMPLATE_TABLE_ID:-}
      FEISHU_MASTER_TASK_TEMPLATE_URL: ${FEISHU_MASTER_TASK_TEMPLATE_URL:-}
      FEISHU_MEETING_INDEX_TABLE_ID: ${FEISHU_MEETING_INDEX_TABLE_ID:-}
      FEISHU_GROUP_NOTIFY_RECEIVE_ID_TYPE: ${FEISHU_GROUP_NOTIFY_RECEIVE_ID_TYPE:-chat_id}
      FEISHU_GROUP_NOTIFY_RECEIVE_ID: ${FEISHU_GROUP_NOTIFY_RECEIVE_ID:-}
      FEISHU_NOTIFY_RECEIVE_ID_TYPE: ${FEISHU_NOTIFY_RECEIVE_ID_TYPE:-email}
      FEISHU_NOTIFY_RECEIVE_ID: ${FEISHU_NOTIFY_RECEIVE_ID:-}
      GETNOTE_API_KEY: ${GETNOTE_API_KEY:-}
      GETNOTE_CLIENT_ID: ${GETNOTE_CLIENT_ID:-}
      GETNOTE_BASE_URL: ${GETNOTE_BASE_URL:-https://openapi.biji.com}
      GETNOTE_LIST_PATH: ${GETNOTE_LIST_PATH:-/open/api/v1/resource/note/list}
      GETNOTE_DETAIL_PATH: ${GETNOTE_DETAIL_PATH:-/open/api/v1/resource/note/detail}
      GETNOTE_TAGS_PATH: ${GETNOTE_TAGS_PATH:-/open/api/v1/resource/note/update}
      GETNOTE_SYNC_TAG: ${GETNOTE_SYNC_TAG:-会议}
      GETNOTE_PROCESSED_TAG: ${GETNOTE_PROCESSED_TAG:-已同步飞书}
      GETNOTE_WORKER_INTERVAL_MINUTES: ${GETNOTE_WORKER_INTERVAL_MINUTES:-10}
      GETNOTE_SCAN_LIMIT: ${GETNOTE_SCAN_LIMIT:-20}
      GETNOTE_MAX_LOOKBACK_DAYS: ${GETNOTE_MAX_LOOKBACK_DAYS:-7}
      GETNOTE_MIN_NOTE_AGE_MINUTES: ${GETNOTE_MIN_NOTE_AGE_MINUTES:-10}
      GETNOTE_PROCESSING_TIMEOUT_MINUTES: ${GETNOTE_PROCESSING_TIMEOUT_MINUTES:-30}
      FEISHU_MEETING_NOTES_USER_ACCESS_TOKEN: ${FEISHU_MEETING_NOTES_USER_ACCESS_TOKEN:-}
      FEISHU_DOCX_USER_ACCESS_TOKEN: ${FEISHU_DOCX_USER_ACCESS_TOKEN:-}
      FEISHU_MEETING_NOTES_DETAIL_PATH: ${FEISHU_MEETING_NOTES_DETAIL_PATH:-/open-apis/vc/v1/notes/:note_id}
      FEISHU_MEETING_NOTES_USER_ID_TYPE: ${FEISHU_MEETING_NOTES_USER_ID_TYPE:-open_id}
      FEISHU_MEETING_SEARCH_PATH: ${FEISHU_MEETING_SEARCH_PATH:-/vc/v1/meetings/search}
      FEISHU_MEETING_DETAIL_PATH: ${FEISHU_MEETING_DETAIL_PATH:-/vc/v1/meetings/:meeting_id}
      FEISHU_MEETING_NOTES_SCAN_LIMIT: ${FEISHU_MEETING_NOTES_SCAN_LIMIT:-10}
      FEISHU_MEETING_NOTES_MAX_LOOKBACK_DAYS: ${FEISHU_MEETING_NOTES_MAX_LOOKBACK_DAYS:-7}
      FEISHU_MEETING_NOTES_MIN_AGE_MINUTES: ${FEISHU_MEETING_NOTES_MIN_AGE_MINUTES:-5}
      FEISHU_MEETING_NOTES_PROCESSING_TIMEOUT_MINUTES: ${FEISHU_MEETING_NOTES_PROCESSING_TIMEOUT_MINUTES:-30}
    volumes:
      - ai_meeting_data:/app/server/data
      - ai_meeting_uploads:/app/server/uploads

volumes:
  ai_meeting_data:
  ai_meeting_uploads:
